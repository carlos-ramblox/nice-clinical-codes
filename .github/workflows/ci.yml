name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-flight run for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: ruff + pytest + pip-audit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      # Tests patch the underlying clients; placeholders satisfy the
      # presence checks in app.config and at the top of each retriever
      # module without making any real API calls.
      ANTHROPIC_API_KEY: dummy-test-key
      OMOPHUB_API_KEY: dummy-test-key
      UMLS_API_KEY: dummy-test-key
      SESSION_SECRET: dummy-test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Pin dev/CI tooling so a tool-side default change cannot
          # break CI under our feet. Bump deliberately. pytest lives
          # here (not requirements.txt) because the production container
          # never runs the test suite.
          pip install ruff==0.15.12 pip-audit==2.10.0 pytest==8.4.0

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Test (pytest)
        working-directory: backend
        run: pytest tests/ -q

      # Advisory: surfaces known-vulnerable dependencies but does not fail
      # the job. Tighten to a hard gate once the backlog is triaged.
      - name: Security audit (pip-audit, advisory)
        continue-on-error: true
        run: pip-audit --requirement backend/requirements.txt --strict
